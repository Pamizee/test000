<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Web Design Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#fff}

header{background:#020617;padding:20px;position:sticky;top:0;z-index:1000}
nav{display:flex;justify-content:center;gap:15px;flex-wrap:wrap}
nav a{color:#38bdf8;text-decoration:none;font-weight:bold}

.hero{text-align:center;padding:80px 20px;background:linear-gradient(135deg,#0f172a,#1e293b)}
.hero h1{font-size:40px}
.hero p{margin-top:10px;color:#94a3b8}

section{padding:60px 20px}
.container{max-width:1100px;margin:auto}
h2{text-align:center;margin-bottom:40px;color:#38bdf8}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:15px;cursor:pointer;transition:.3s;opacity:0;transform:translateY(50px)}
.card.show{opacity:1;transform:translateY(0)}
.card:hover{transform:translateY(-10px)}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:2000}
.modal-content{background:#020617;padding:20px;border-radius:15px;max-width:800px;width:90%;text-align:center}

.slider img{width:100%;border-radius:10px}
.dots{display:flex;justify-content:center;gap:8px;margin-top:10px}
.dot{width:10px;height:10px;border-radius:50%;background:#64748b;cursor:pointer}
.dot.active{background:#38bdf8}
.controls{margin-top:10px;display:flex;justify-content:space-between;gap:10px}
.btn{padding:8px 15px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer}

footer{text-align:center;padding:20px;background:#020617}
</style>
</head>
<body>

<header>
<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#Portfolio">Portfolio</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home" class="hero">
<h1>Itz_Me The Designer</h1>
<p>I am a Professional Web Designer Pamidu Vibhash Fernando.</p>
</section>

<section id="services">
<div class="container">
<h2>My Services</h2>
<div class="cards">
<div class="card">Website Design</div>
<div class="card">Landing Pages</div>
<div class="card">E-commerce</div>
</div>
</div>
</section>

<section id="portfolio">
<div class="container">
<h2>My Work</h2>
<div class="cards">
<div class="card" onclick="openProject(1)"><h3>Accounting Services Web</h3></div>
<div class="card" onclick="openProject(2)"><h3>Pokemon Website</h3></div>
<div class="card" onclick="openProject(3)"><h3>Trading FX</h3></div>
</div>
</div>
</section>

<div id="modal" class="modal">
<div class="modal-content">
<h2 id="modal-title"></h2>
<div class="slider">
<img id="slider-img">
</div>
<div class="dots" id="dots"></div>
<div class="controls">
<button class="btn" onclick="prevImage()">Prev</button>
<button class="btn" onclick="toggleAuto()" id="autoBtn">Pause</button>
<button class="btn" onclick="nextImage()">Next</button>
</div>
<br>
<button class="btn" onclick="closeModal()">Close</button>
</div>
</div>

<section id="contact">
<div class="container">
<h2>Contact Me</h2>
<p>Email: appachchimr@gmail.com</p>
</div>
</section>

<footer>
<p>© 2026 Pamidu The Designer</p>
</footer>

<script>
document.querySelectorAll('a[href^="#"]').forEach(a=>{a.addEventListener('click',e=>{const id=a.getAttribute('href');if(id==='#')return;const t=document.querySelector(id);if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}});});

const cards=document.querySelectorAll('.card');
function reveal(){cards.forEach(c=>{if(c.getBoundingClientRect().top<window.innerHeight-50)c.classList.add('show');});}
window.addEventListener('scroll',reveal);window.addEventListener('load',reveal);

let images=[],currentIndex=0,autoSlide=null,isPlaying=true;
function openProject(id){
 const title=document.getElementById('modal-title');
 if(id===1){title.innerText='Accounting Services Web';images=['images/tkv01.png','images/tkv02.png','images/tkv03.png'];}
 if(id===2){title.innerText='Pokemon Website';images=['images/pm01.png','images/pm02.png','images/pm03.png'];}
 if(id===3){title.innerText='Coming Soon';images=['images/p3-1.jpg','images/p3-2.jpg','images/p3-3.jpg'];}
 currentIndex=0; renderDots(); showImage(); document.getElementById('modal').style.display='flex'; startAutoSlide();
}

function showImage(){document.getElementById('slider-img').src=images[currentIndex]; updateDots();}
function nextImage(){currentIndex=(currentIndex+1)%images.length; showImage();}
function prevImage(){currentIndex=(currentIndex-1+images.length)%images.length; showImage();}

function renderDots(){const dots=document.getElementById('dots');dots.innerHTML=''; images.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>{currentIndex=i;showImage();};dots.appendChild(d);});}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentIndex));}

function startAutoSlide(){stopAutoSlide();autoSlide=setInterval(nextImage,2000);isPlaying=true;autoBtn.innerText='Pause';}
function stopAutoSlide(){if(autoSlide)clearInterval(autoSlide);isPlaying=false;autoBtn.innerText='Play';}
function toggleAuto(){isPlaying?stopAutoSlide():startAutoSlide();}

function closeModal(){document.getElementById('modal').style.display='none'; stopAutoSlide();}

let startX=0,endX=0;
const slider=document.querySelector('.slider');
slider.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
slider.addEventListener('touchmove',e=>endX=e.touches[0].clientX);
slider.addEventListener('touchend',()=>{if(startX-endX>50)nextImage();else if(endX-startX>50)prevImage();});
</script>

</body>
</html>
